version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: arff-db
    environment:
      POSTGRES_USER: arff_user
      POSTGRES_PASSWORD: arff_password
      POSTGRES_DB: arff_erp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
