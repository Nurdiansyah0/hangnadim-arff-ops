version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: arff-db
    environment:
      POSTGRES_USER: arff_user
      POSTGRES_PASSWORD: arff_password
      POSTGRES_DB: arff_erp
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arff_user -d arff_erp"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: arff-backend
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://arff_user:arff_password@db:5432/arff_erp
      JWT_SECRET: super_secret_temporary_key_for_dev
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: arff-frontend
    ports:
      - "3000:3000"
    environment:
      API_URL: http://arff-backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
